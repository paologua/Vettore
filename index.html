<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VETTORE — Tool Operativo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#f4f1eb; --s1:#ede9e1; --s2:#e5e0d6;
  --border:#ccc8be; --text:#1a1814; --muted:#7a766e; --muted2:#a09c94;
  --accent:#c8401a; --ink:#2d2a24;
  --serif:'DM Serif Display',Georgia,serif;
  --mono:'DM Mono',monospace;
  --f1:#c8401a; --f2:#b8860b; --f3:#2d6a2d; --f4:#1a5a8a; --f5:#6b2d8a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:120px;}

/* HEADER */
.top-bar{background:var(–ink);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;align-items:baseline;gap:10px;}
.tb-title{font-family:var(–serif);font-size:22px;color:var(–bg);}
.tb-sub{font-size:9px;letter-spacing:.15em;color:var(–muted2);text-transform:uppercase;}
.tb-right{display:flex;gap:6px;align-items:center;}
.timer-display{font-family:var(–mono);font-size:14px;font-weight:500;color:var(–bg);letter-spacing:.05em;}
.timer-btn{font-family:var(–mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:5px 8px;border:1px solid #444;background:none;color:var(–muted2);border-radius:2px;cursor:pointer;}
.timer-btn.running{background:var(–accent);color:#fff;border-color:var(–accent);}
.timer-btn:active{transform:scale(.93);}

/* PHASE BAR */
.phase-bar{display:flex;border-bottom:1px solid var(–border);background:var(–s1);}
.pb-item{flex:1;padding:10px 4px;text-align:center;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.pb-item.active{border-bottom-color:var(–accent);}
.pb-item.done{opacity:.5;}
.pb-num{font-family:var(–mono);font-size:8px;font-weight:500;letter-spacing:.1em;}
.pb-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}

/* PHASE COLORS */
.ph-f1 .pb-num{color:var(–f1);}
.ph-f2 .pb-num{color:var(–f2);}
.ph-f3 .pb-num{color:var(–f3);}
.ph-f4 .pb-num{color:var(–f4);}
.ph-f5 .pb-num{color:var(–f5);}
.ph-f1.active{border-bottom-color:var(–f1) !important;}
.ph-f2.active{border-bottom-color:var(–f2) !important;}
.ph-f3.active{border-bottom-color:var(–f3) !important;}
.ph-f4.active{border-bottom-color:var(–f4) !important;}
.ph-f5.active{border-bottom-color:var(–f5) !important;}

/* MAIN */
main{padding:14px 14px 0;}

/* PHASE HEADER */
.phase-head{padding:14px 16px;border-radius:5px;margin-bottom:12px;}
.ph-eyebrow{font-size:8px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;opacity:.7;}
.ph-title{font-family:var(–serif);font-size:26px;line-height:1;margin-bottom:3px;}
.ph-sub{font-size:10px;opacity:.75;line-height:1.4;}
.ph-meta{display:flex;gap:8px;margin-top:8px;}
.ph-pill{font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid currentColor;opacity:.7;}

/* CARDS */
.card{background:var(–s1);border:1px solid var(–border);border-radius:5px;overflow:hidden;margin-bottom:8px;}
.card-head{padding:11px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.card-head:active{background:var(–s2);}
.ch-icon{width:24px;height:24px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.ch-info{flex:1;}
.ch-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:1px;}
.ch-sub{font-size:9px;color:var(–muted);line-height:1.3;}
.ch-arr{font-size:9px;color:var(–muted2);transition:transform .18s;}
.card.open .ch-arr{transform:rotate(180deg);}
.card-body{border-top:1px solid var(–border);padding:12px 13px;}

/* BASELINE TRACKER */
.baseline-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.bl-item{background:var(–bg);border:1px solid var(–border);border-radius:3px;padding:8px 10px;}
.bl-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(–muted2);margin-bottom:4px;}
.bl-input{width:100%;font-family:var(–mono);font-size:11px;background:none;border:none;outline:none;color:var(–text);}
.bl-input::placeholder{color:var(–muted2);}

/* DOMANDE */
.q-list{display:flex;flex-direction:column;gap:4px;}
.q-item{background:var(–ink);border-radius:3px;padding:10px 12px;cursor:pointer;transition:opacity .1s;}
.q-item:active{opacity:.8;}
.qi-text{font-family:var(–serif);font-size:15px;color:var(–bg);line-height:1.3;margin-bottom:3px;}
.qi-why{font-size:9px;color:var(–muted2);line-height:1.4;}
.qi-used{display:flex;justify-content:space-between;align-items:center;}
.qi-check{font-size:9px;color:var(–muted2);}
.q-item.used{opacity:.4;}
.q-item.used .qi-check{color:#50d090;}

/* MARKER CHECKLIST */
.marker-list{display:flex;flex-direction:column;gap:4px;}
.marker-item{padding:9px 11px;background:var(–bg);border:1px solid var(–border);border-radius:3px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.marker-item:active{background:var(–s2);}
.marker-item.flagged{border-color:var(–accent);background:rgba(200,64,26,.05);}
.mi-check{width:16px;height:16px;border:1.5px solid var(–border);border-radius:2px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s;}
.marker-item.flagged .mi-check{background:var(–accent);border-color:var(–accent);color:#fff;}
.mi-body{flex:1;}
.mi-code{font-size:7px;letter-spacing:.15em;color:var(–muted2);text-transform:uppercase;margin-bottom:1px;}
.mi-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px;}
.mi-desc{font-size:10px;color:var(–muted);line-height:1.4;}
.mi-spec{display:flex;gap:2px;margin-top:3px;}
.spec-d{width:6px;height:6px;border-radius:50%;background:var(–border);}
.spec-d.on{background:var(–accent);}

/* NOTE */
.note-area{width:100%;min-height:80px;font-family:var(–mono);font-size:11px;background:var(–bg);border:1px solid var(–border);border-radius:3px;padding:8px 10px;color:var(–text);outline:none;resize:vertical;transition:border-color .15s;}
.note-area:focus{border-color:var(–accent);}
.note-area::placeholder{color:var(–muted2);}

/* GAP LOG */
.gap-row{display:flex;gap:6px;margin-bottom:5px;}
.gap-input{flex:1;font-family:var(–mono);font-size:11px;background:var(–bg);border:1px solid var(–border);border-radius:2px;padding:6px 9px;color:var(–text);outline:none;}
.gap-input:focus{border-color:var(–accent);}
.gap-add{padding:6px 10px;background:var(–ink);color:var(–bg);border:none;border-radius:2px;font-family:var(–mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.gap-add:active{opacity:.8;}
.gap-list{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.gap-item{padding:7px 10px;background:var(–bg);border:1px solid var(–border);border-radius:2px;display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.gap-del{font-size:10px;color:var(–muted2);cursor:pointer;padding:2px 5px;}
.gap-del:hover{color:var(–accent);}

/* CONTRADDIZIONI */
.contra-item{padding:10px 12px;background:rgba(200,64,26,.06);border:1px solid rgba(200,64,26,.25);border-radius:3px;margin-bottom:5px;}
.ci-tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(–accent);margin-bottom:3px;}
.ci-text{font-size:11px;line-height:1.5;color:var(–ink);}
.ci-del{font-size:9px;color:var(–muted2);cursor:pointer;float:right;margin-top:-2px;}

/* TIPO NARRATIVO */
.tipo-selector{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px;}
.tipo-btn{padding:10px 8px;border:1px solid var(–border);border-radius:3px;background:var(–bg);cursor:pointer;text-align:center;transition:all .15s;}
.tipo-btn:active{transform:scale(.96);}
.tipo-btn.sel{border-width:2px;}
.tipo-btn.omissione.sel{border-color:#b8860b;background:rgba(184,134,11,.07);}
.tipo-btn.negazione.sel{border-color:var(–accent);background:rgba(200,64,26,.07);}
.tipo-btn.invenzione.sel{border-color:#6b2d8a;background:rgba(107,45,138,.07);}
.tipo-btn.sincero.sel{border-color:#2d6a2d;background:rgba(45,106,45,.07);}
.tb-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.tb-desc{font-size:9px;color:var(–muted);line-height:1.3;}

/* TOOL CARDS */
.tool-item{padding:11px 12px;background:var(–bg);border:1px solid var(–border);border-radius:3px;margin-bottom:5px;}
.tool-item.highlighted{border-color:currentColor;}
.ti-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;font-weight:700;}
.ti-q{font-family:var(–serif);font-size:15px;line-height:1.3;color:var(–ink);margin-bottom:3px;}
.ti-why{font-size:9px;color:var(–muted);line-height:1.4;}
.tool-use-btn{font-family:var(–mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;background:none;border:1px solid var(–border);border-radius:2px;color:var(–muted2);cursor:pointer;margin-top:6px;}
.tool-use-btn:active{background:var(–ink);color:var(–bg);border-color:var(–ink);}
.tool-use-btn.done{background:var(–s2);color:var(–muted2);}

/* CONTENIMENTO */
.contra-present{padding:11px 13px;background:var(–ink);border-radius:4px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;}
.cp-num{font-family:var(–serif);font-size:22px;color:rgba(244,241,235,.25);line-height:1;flex-shrink:0;}
.cp-body{flex:1;}
.cp-tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(–accent);margin-bottom:3px;}
.cp-text{font-size:12px;line-height:1.5;color:rgba(244,241,235,.85);}
.cp-q{font-family:var(–serif);font-size:14px;color:var(–bg);margin-top:6px;line-height:1.35;padding-top:6px;border-top:1px solid rgba(255,255,255,.08);}

/* REPORT */
.report-section{background:var(–s1);border:1px solid var(–border);border-radius:5px;padding:14px;margin-bottom:8px;}
.rs-title{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(–muted2);margin-bottom:10px;}
.rs-stat{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(–border);}
.rs-stat:last-child{border-bottom:none;}
.rs-key{font-size:11px;color:var(–muted);}
.rs-val{font-size:12px;font-weight:700;color:var(–ink);}
.rs-val.accent{color:var(–accent);}

/* BOTTOM */
.bottom-row{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;padding:10px 14px;background:rgba(244,241,235,.97);backdrop-filter:blur(12px);border-top:1px solid var(–border);display:flex;gap:6px;z-index:100;}
.bot-btn{flex:1;padding:12px 6px;font-family:var(–mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;border:1px solid var(–border);background:var(–s1);color:var(–muted);cursor:pointer;transition:all .12s;}
.bot-btn:active{transform:scale(.97);}
.bot-btn.primary{background:var(–ink);color:var(–bg);border-color:var(–ink);}
.bot-btn.accent{background:var(–accent);color:#fff;border-color:var(–accent);}

.section-lbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(–muted2);margin:10px 0 6px;}
.info-box{background:rgba(200,64,26,.07);border:1px solid rgba(200,64,26,.2);border-radius:3px;padding:10px 12px;margin-bottom:8px;font-size:11px;line-height:1.6;color:var(–ink);}
.info-box strong{color:var(–accent);}

/* ── LINGUA DRAWER ── */
.drawer-overlay{position:fixed;inset:0;z-index:300;background:rgba(26,24,20,.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s;}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:520px;z-index:301;background:var(–bg);border-radius:12px 12px 0 0;border-top:1px solid var(–border);max-height:88vh;display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.32,.72,0,1);}
.drawer-overlay.open .drawer{transform:translateX(-50%) translateY(0);}
.drawer-handle-row{padding:10px 16px 0;display:flex;justify-content:center;flex-shrink:0;}
.drawer-handle{width:36px;height:3px;background:var(–border);border-radius:2px;}
.drawer-header{padding:12px 16px 10px;border-bottom:1px solid var(–border);flex-shrink:0;}
.dh-eyebrow{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(–muted2);margin-bottom:3px;}
.dh-code{font-size:8px;letter-spacing:.15em;color:var(–muted2);text-transform:uppercase;margin-bottom:2px;}
.dh-name{font-family:var(–serif);font-size:22px;color:var(–ink);line-height:1;margin-bottom:4px;}
.dh-spec{display:flex;gap:3px;align-items:center;}
.ds-dot{width:7px;height:7px;border-radius:50%;background:var(–border);}
.ds-dot.on{background:var(–accent);}
.ds-lbl{font-size:8px;color:var(–muted2);margin-left:4px;}
.drawer-body{overflow-y:auto;padding:14px 16px 32px;flex:1;}
.db-block{margin-bottom:16px;}
.db-label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(–muted2);margin-bottom:6px;}
.db-text{font-size:11px;line-height:1.7;color:var(–ink);}
.db-text strong{color:var(–accent);}
.db-op{font-size:11px;line-height:1.7;color:var(–ink);font-weight:600;padding:8px 10px;background:rgba(200,64,26,.06);border-left:2px solid var(–accent);border-radius:0 3px 3px 0;}
.ex-list{display:flex;flex-direction:column;gap:5px;}
.ex-it{padding:8px 10px;background:var(–s1);border-left:2px solid var(–border);border-radius:0 3px 3px 0;}
.ex-it.red{border-left-color:var(–accent);}
.ex-txt{font-size:11px;font-style:italic;line-height:1.5;color:var(–ink);margin-bottom:2px;}
.ex-note{font-size:9px;color:var(–muted);}
.dq-list{display:flex;flex-direction:column;gap:5px;}
.dq-it{background:var(–ink);border-radius:3px;padding:10px 12px;cursor:pointer;transition:opacity .1s;}
.dq-it:active{opacity:.8;}
.dq-text{font-family:var(–serif);font-size:15px;color:var(–bg);line-height:1.3;margin-bottom:3px;}
.dq-why{font-size:9px;color:var(–muted2);line-height:1.4;}
.dq-it.used-q .dq-text{opacity:.5;}
.drawer-close{position:absolute;top:14px;right:16px;font-family:var(–mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border:1px solid var(–border);background:var(–s1);color:var(–muted);border-radius:2px;cursor:pointer;}
.mi-lingua-btn{font-family:var(–mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;background:none;border:1px solid var(–border);border-radius:2px;color:var(–muted2);cursor:pointer;margin-top:5px;display:inline-block;}
.mi-lingua-btn:active{background:var(–ink);color:var(–bg);}
.marker-item.flagged .mi-lingua-btn{border-color:var(–accent);color:var(–accent);}
.fonte-small{font-size:9px;color:var(–muted2);font-style:italic;padding-top:8px;border-top:1px solid var(–border);line-height:1.5;}
</style>

</head>
<body>

<div class="top-bar">
  <div class="tb-left">
    <div class="tb-title">VETTORE</div>
    <div class="tb-sub">Tool operativo</div>
  </div>
  <div class="tb-right">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">Avvia</button>
  </div>
</div>

<div class="phase-bar" id="phaseBar"></div>
<main id="main"></main>

<div class="bottom-row" id="bottomRow"></div>

<!-- LINGUA DRAWER -->

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawer()">Chiudi</button>
    <div class="drawer-handle-row"><div class="drawer-handle"></div></div>
    <div class="drawer-header" id="drawerHeader"></div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

let currentPhase = 0; // 0-4
let timerInterval = null;
let timerSec = 0;
let timerRunning = false;
let latencyInterval = null;
let latencySec = 0;

const state = {
  soggetto: "",
  baseline: { io_rate: "", hedging: "", velocita: "", struttura: "" },
  gaps: [],
  markers_flagged: new Set(),
  tipo_narrativo: null,
  note_mappa: "",
  note_sonda: "",
  contraddizioni: [],
  tools_used: new Set(),
  q_used: new Set(),
  start_time: null,
};

// ═══════════════════════════════════════════════════════════
// PHASES CONFIG
// ═══════════════════════════════════════════════════════════

const PHASES = [
  { id:"f1", name:"Ancoraggio", sub:"Costruisci baseline", durata:"5–10 min", obiettivo:"Profilo linguistico base", color:"var(--f1)" },
  { id:"f2", name:"Mappa",      sub:"Fai narrare libero",  durata:"10–20 min", obiettivo:"Versione spontanea + gap", color:"var(--f2)" },
  { id:"f3", name:"Sonda",      sub:"Esplora i punti deboli", durata:"10–25 min", obiettivo:"Domande ancorate al testo", color:"var(--f3)" },
  { id:"f4", name:"Pressione",  sub:"Strumenti selezionati", durata:"Variabile", obiettivo:"Carico cognitivo + nuovi segnali", color:"var(--f4)" },
  { id:"f5", name:"Contenimento", sub:"Chiudi le vie di fuga", durata:"Variabile", obiettivo:"Contraddizioni esplicite", color:"var(--f5)" },
];

// ═══════════════════════════════════════════════════════════
// MARKER DB (alta specificità)
// ═══════════════════════════════════════════════════════════

const MARKERS = [
  { id:"P01", name:"Riduzione pronome IO", spec:3, cat:"pronominale", desc:"Uso diminuito di 'io' su argomenti critici vs baseline." },
  { id:"P05", name:"Risposta in terza persona", spec:3, cat:"pronominale", desc:"Risponde con 'lui/lei/si' a domanda che usava 'tu'." },
  { id:"P08", name:"Inversione agente-paziente", spec:2, cat:"pronominale", desc:"'Mi sono ritrovato a fare' invece di 'Ho fatto'." },
  { id:"T01", name:"Alibi temporale preciso", spec:3, cat:"temporale", desc:"Orari esatti su eventi ordinari — precisione impossibile." },
  { id:"T02", name:"Gap temporale non spiegato", spec:3, cat:"temporale", desc:"Periodo rilevante non coperto dalla narrazione." },
  { id:"T03", name:"Verb tense shift", spec:3, cat:"temporale", desc:"Passaggio dal passato al presente senza ragione discorsiva." },
  { id:"T07", name:"Espansione su periodi non critici", spec:2, cat:"temporale", desc:"Molto prima e dopo, poco o nulla al centro." },
  { id:"E01", name:"Hedging eccessivo su fatti certi", spec:3, cat:"epistemico", desc:"'Credo', 'mi sembra' su cose che dovrebbe ricordare bene." },
  { id:"E04", name:"Sapere inatteso", spec:3, cat:"epistemico", desc:"Sa qualcosa che non dovrebbe sapere se fosse assente." },
  { id:"E08", name:"Over-affermazione di onestà", spec:2, cat:"epistemico", desc:"'Vi giuro', 'sulla mia vita', 'sono completamente onesto'." },
  { id:"E09", name:"Risposta alla domanda sbagliata", spec:3, cat:"epistemico", desc:"Risponde a una versione diversa della domanda posta." },
  { id:"N01", name:"Negazione qualificata", spec:3, cat:"negazione", desc:"'Non sono il tipo che' invece di 'Non l'ho fatto'." },
  { id:"N02", name:"Negazione parziale", spec:3, cat:"negazione", desc:"Nega la versione estrema dell'accusa, non quella reale." },
  { id:"N03", name:"Negazione ridondante", spec:2, cat:"negazione", desc:"Nega la stessa cosa 3+ volte nella stessa risposta." },
  { id:"NA01", name:"Assenza dettagli sensoriali", spec:3, cat:"narrativo", desc:"Nessun elemento visivo, uditivo, olfattivo nel ricordo." },
  { id:"NA02", name:"Dettaglio centrale compresso", spec:3, cat:"narrativo", desc:"L'evento chiave in poche parole, il contorno espanso." },
  { id:"NA05", name:"Introduzione non richiesta", spec:2, cat:"narrativo", desc:"Aggiunge elementi difensivi senza essere chiesto." },

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById("timerBtn").textContent = "Riprendi";
    document.getElementById("timerBtn").classList.remove("running");
  } else {
    if (!state.start_time) state.start_time = new Date();
    timerRunning = true;
    timerInterval = setInterval(() => {
      timerSec++;
      const m = String(Math.floor(timerSec/60)).padStart(2,"0");
      const s = String(timerSec%60).padStart(2,"0");
      document.getElementById("timerDisplay").textContent = m+":"+s;
    }, 1000);
    document.getElementById("timerBtn").textContent = "Pausa";
    document.getElementById("timerBtn").classList.add("running");
  }
}

function goPhase(n) {
currentPhase = Math.max(0, Math.min(4, n));
render();
window.scrollTo(0, 0);
}

function toggleCard(id) {
const el = document.getElementById(“card-”+id);
if (!el) return;
el.classList.toggle(“open”);
el.querySelector(”.ch-arr”).style.transform = el.classList.contains(“open”) ? “rotate(180deg)” : “”;
const body = el.querySelector(”.card-body”);
if (body) body.style.display = el.classList.contains(“open”) ? “” : “none”;
}

function saveBaseline(key, val) { state.baseline[key] = val; }

function useQ(id) {
if (state.q_used.has(id)) state.q_used.delete(id);
else state.q_used.add(id);
render();
}

function toggleMarker(id) {
if (state.markers_flagged.has(id)) state.markers_flagged.delete(id);
else state.markers_flagged.add(id);
render();
}

function addGap() {
const inp = document.getElementById(“gapInput”);
if (!inp || !inp.value.trim()) return;
state.gaps.push(inp.value.trim());
inp.value = “”;
document.getElementById(“gapList”).innerHTML = renderGaps();
}

function removeGap(i) {
state.gaps.splice(i, 1);
document.getElementById(“gapList”).innerHTML = renderGaps();
}

function addContra() {
const inp = document.getElementById(“contraInput”);
if (!inp || !inp.value.trim()) return;
state.contraddizioni.push(inp.value.trim());
inp.value = “”;
render();
}

function removeContra(i) {
state.contraddizioni.splice(i, 1);
render();
}

function setTipo(t) {
state.tipo_narrativo = state.tipo_narrativo === t ? null : t;
render();
}

function useTool(id, btn) {
if (state.tools_used.has(id)) state.tools_used.delete(id);
else state.tools_used.add(id);
render();
}

function exportSession() {
const data = {
meta: { timestamp: new Date().toISOString(), durata_sec: timerSec, metodo: “VETTORE v1.0” },
baseline: state.baseline,
tipo_narrativo: state.tipo_narrativo,
gaps: state.gaps,
markers_flagged: […state.markers_flagged],
contraddizioni: state.contraddizioni,
tools_used: […state.tools_used],
domande_usate: […state.q_used],
note: { mappa: state.note_mappa, sonda: state.note_sonda },
};
const blob = new Blob([JSON.stringify(data, null, 2)], { type: “application/json” });
const a = document.createElement(“a”);
a.href = URL.createObjectURL(blob);
a.download = `vettore_sessione_${new Date().toISOString().slice(0,10)}.json`;
a.click();
}

function escH(s) {
return String(s||””).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”);
}

{q:“Quando dici ‘abbiamo’ — chi era presente esattamente?”,why:“Il ‘noi’ generico collassa sotto specificazione.”},
],
fonte:“Pennebaker (2011); Adams (1996).”},

P03:{id:“P03”,cat:“pronominale”,spec:2,name:“Pronome indefinito come schermo”,
desc:“Uso di ‘uno’, ‘si’, ‘qualcuno’, ‘le persone’ per evitare la prima persona. Il soggetto trasferisce l’agentività a un pronome indefinito che include implicitamente sé stesso ma non lo nomina.”,
operativo:“Ogni ‘si è fatto’, ‘uno tende a’, ‘le persone in queste situazioni’ merita una domanda di specificazione.”,
esempi:[
{txt:”«Si tende a non fare troppe domande in quel contesto.»”,note:”‘Si’ include il soggetto ma non lo nomina.”,red:true},
],
domande:[
{q:“Stai parlando di te o in generale?”,why:“La domanda diretta costringe a scegliere.”},
{q:“Tu personalmente — hai fatto questa cosa?”,why:“Elimina lo schermo indefinito.”},
],
fonte:“Sapir (1987) — SCAN: linguaggio in prima persona come criterio di autenticità.”},

P05:{id:“P05”,cat:“pronominale”,spec:3,name:“Risposta in terza persona a domanda in seconda”,
desc:“Quando l’interlocutore chiede ‘Hai fatto X?’ e il soggetto risponde ‘Quello non è stato fatto’ — il cambio pronominale è uno dei segnali pronominali più specifici.”,
operativo:“Il cambio da seconda a terza persona su domanda diretta è ad alta specificità.”,
esempi:[
{txt:“D: ‘Hai tu firmato quel documento?’ R: ‘Quel documento è stato firmato nel quadro della procedura normale.’”,note:“Passivo senza agente — risponde senza rispondere.”,red:true},
],
domande:[
{q:“La mia domanda era su di te — sei stato tu o no?”,why:“Riancora esplicitamente la domanda al soggetto.”},
],
fonte:“Vrij (2008) — evasione pronominale come strategia di distanza.”},

P08:{id:“P08”,cat:“pronominale”,spec:2,name:“Inversione agente-paziente”,
desc:”«Mi sono trovato in quella situazione», «mi è capitato di». Il soggetto grammaticalizza sé stesso come destinatario passivo invece che come attore attivo.”,
operativo:“Nota i costrutti passivi e riflessivi su azioni che il soggetto ha compiuto attivamente.”,
esempi:[
{txt:”«Mi sono ritrovato a gestire quella situazione.»”,note:”‘Ritrovato’ — come se fosse accaduto senza intenzione.”,red:true},
{txt:”«Ho scelto di gestire quella situazione.»”,note:“Agentività esplicita — costrutto autentico.”,red:false},
],
domande:[
{q:“Hai scelto tu di farlo o è capitato senza volerlo?”,why:“Forza la distinzione tra agentività e passività.”},
],
fonte:“Sapir (1987) — SCAN: agentività linguistica come criterio di verità.”},

T01:{id:“T01”,cat:“temporale”,spec:3,name:“Alibi temporale eccessivamente preciso”,
desc:“La memoria episodica non funziona come un registro. I dettagli temporali precisi su eventi ordinari di settimane fa non emergono spontaneamente. Quando li fornisce senza essere chiesto, sta attingendo a un racconto costruito.”,
operativo:“Chiedi dove ha ricevuto questa informazione temporale. Se non può dirlo, la precisione è sospetta.”,
esempi:[
{txt:”«Ero a casa dalle 19:47. Ho cenato alle 20:15, ho guardato la TV fino alle 22:30.»”,note:“Precisione impossibile per ricordo naturale di una serata ordinaria.”,red:true},
{txt:”«Quella sera ero a casa, ho cenato tardi, mi sembra verso le otto e mezza.»”,note:“Imprecisioni tipiche del ricordo autentico.”,red:false},
],
domande:[
{q:“Come fai a sapere con certezza che erano le 19:47?”,why:“Chiede la fonte della precisione — il ricordo autentico non ha fonte.”},
{q:“Normalmente ricordi gli orari con questa precisione?”,why:“Confronto con il comportamento memorativo abituale.”},
],
fonte:“Loftus (1979); Vrij (2008).”},

T02:{id:“T02”,cat:“temporale”,spec:3,name:“Gap temporale non giustificato”,
desc:“Le narrazioni autentiche hanno lacune distribuite casualmente. I gap costruiti tendono a coprire esattamente il periodo rilevante. La narrazione salta da un momento sicuro a un momento sicuro, lasciando vuoto il centro.”,
operativo:“Mappa la linea temporale. Dove si ferma la narrazione? Cosa copre il gap?”,
esempi:[
{txt:”«Sono uscito verso le sei, poi il mattino dopo ero già in ufficio.»”,note:“Tutta la notte non viene coperta.”,red:true},
],
domande:[
{q:“Cosa è successo tra le sei di sera e il mattino dopo?”,why:“Riempie il gap con una richiesta diretta.”},
{q:“Non ricordi cosa hai fatto quella sera o non vuoi dirlo?”,why:“Distingue tra dimenticanza e reticenza.”},
],
fonte:“Adams (1996) — gap narrativi come indicatori SCAN.”},

T03:{id:“T03”,cat:“temporale”,spec:3,name:“Verb tense shift non giustificato”,
desc:“Quando un soggetto passa improvvisamente al presente storico narrando eventi passati, sta rendendo il ricordo più vivido — spesso perché sta costruendo la scena mentre parla.”,
operativo:“Trascrivi i tempi verbali per ogni segmento. Le discontinuità sono i punti di analisi.”,
esempi:[
{txt:”«Eravamo in ufficio, parlavamo del progetto, poi lui si alza e mi dice…»”,note:“Shift al presente — ricostruzione visiva attiva.”,red:true},
],
domande:[
{q:“Stai ricordando o stai immaginando questa scena?”,why:“La domanda rivela la fonte del racconto.”},
],
fonte:“Sapir (1987); Adams (1996).”},

T07:{id:“T07”,cat:“temporale”,spec:2,name:“Espansione narrativa su periodi non critici”,
desc:“Il soggetto descrive in dettaglio le ore precedenti e successive all’evento, comprimendo o saltando il momento rilevante. Displacement narrativo: si parla di ciò che non è problematico per evitare ciò che lo è.”,
operativo:“Misura il rapporto parole/minuto di tempo narrato per ogni segmento.”,
esempi:[
{txt:”«Quella mattina mi sono alzato alle sette, colazione, palestra… poi verso sera ero di nuovo a casa.»”,note:“Molto prima e dopo — il pomeriggio critico non viene narrato.”,red:true},
],
domande:[
{q:“E il pomeriggio — dove eri?”,why:“Riempie il gap con richiesta diretta.”},
],
fonte:“Adams (1996); Steller & Köhnken (1989).”},

E01:{id:“E01”,cat:“epistemico”,spec:3,name:“Hedging eccessivo su fatti certi”,
desc:“L’hedging epistemico è normale quando c’è genuina incertezza. Diventa segnale quando viene usato su fatti che il soggetto dovrebbe ricordare con certezza. Costruisce ambiguità protettiva.”,
operativo:“Classifica ogni affermazione in: certa, plausibilmente incerta, sospettosamente incerta.”,
esempi:[
{txt:”«Credo di esserci andato, mi sembra di sì. Non ricordo bene.»”,note:“Sull’evento centrale dell’interrogatorio.”,red:true},
{txt:”«Sì, c’ero — ricordo chiaramente perché era il compleanno di mia sorella.»”,note:“Certezza ancorata a un dettaglio contestuale.”,red:false},
],
domande:[
{q:”‘Credo’ — o ci sei andato o non ci sei andato. Qual è?”,why:“Forza la scelta binaria eliminando l’ambiguità.”},
{q:“Cosa ti farebbe ricordare con certezza?”,why:“Sonda la fonte epistemica del ricordo.”},
],
fonte:“Vrij (2008) — hedging come strategia di distancing epistemico.”},

E04:{id:“E04”,cat:“epistemico”,spec:3,name:“Sapere inatteso”,
desc:“Uno dei segnali più forti. Se il soggetto afferma di non essere stato presente, ma poi dimostra conoscenza di dettagli che solo un testimone diretto potrebbe avere, la sua versione è contraddetta dalla sua stessa conoscenza.”,
operativo:“Confronta sistematicamente ciò che afferma di sapere con ciò che afferma di non aver visto o fatto.”,
esempi:[
{txt:”«Non ero lì. So solo che hanno usato la porta sul retro perché quella principale era bloccata.»”,note:“Sa della porta — come?”,red:true},
],
domande:[
{q:“Come sai della porta sul retro se non eri lì?”,why:“La contraddizione viene esplicitata.”},
],
fonte:“Vrij (2008) — knowledge leakage come indicatore ad alta specificità.”},

E08:{id:“E08”,cat:“epistemico”,spec:2,name:“Over-affermazione di onestà”,
desc:“Le persone oneste tendono a non enfatizzare la propria onestà. Le formule di giuramento sono più frequenti nei testi ingannevoli — il soggetto cerca di compensare linguisticamente la mancanza di verità.”,
operativo:“Conta le formule di assicurazione della verità. Contrasta con il contenuto informativo.”,
esempi:[
{txt:”«Vi giuro sulla vita dei miei figli che quella sera non ero lì. Ve lo prometto, sono completamente onesto.»”,note:“Due formule di giuramento su una sola affermazione.”,red:true},
{txt:”«Quella sera ero a casa.»”,note:“Affermazione diretta senza enfasi.”,red:false},
],
domande:[
{q:“Non ho dubitato della tua onestà — perché ti sembra importante sottolinearlo?”,why:“La meta-comunicazione mette a fuoco l’enfasi stessa.”},
],
fonte:“Vrij (2008); Ekman (1985).”},

E09:{id:“E09”,cat:“epistemico”,spec:3,name:“Risposta alla domanda sbagliata”,
desc:“La domanda posta era specifica. La risposta copre un territorio diverso — più ampio, più generico, o laterale. Il soggetto ha scelto la domanda a cui rispondere.”,
operativo:“Trascrivi la domanda e la risposta. Sono sulla stessa cosa?”,
esempi:[
{txt:“D: ‘Hai aperto quel file?’ R: ‘Io non ho mai violato le policy aziendali in vita mia.’”,note:“La risposta allarga il campo evitando la domanda specifica.”,red:true},
],
domande:[
{q:“La mia domanda era specifica: hai aperto quel file — sì o no?”,why:“Riancora la domanda originale senza accettare la risposta laterale.”},
],
fonte:“Sapir (1987) — risposta alla domanda come criterio SCAN.”},

N01:{id:“N01”,cat:“negazione”,spec:3,name:“Negazione qualificata”,
desc:”‘Non sono il tipo che…’ invece di ‘Non l’ho fatto.’ La negazione autentica è diretta. La negazione qualificata introduce una descrizione di sé stesso come tipo di persona — questa costruzione è vera in astratto mentre la negazione specifica dell’atto sarebbe falsa.”,
operativo:“Distingui tra negazione dell’atto specifico e negazione del carattere compatibile con l’atto.”,
esempi:[
{txt:”«Non sono una persona che userebbe mai i dati degli altri in questo modo.»”,note:“Descrive il carattere — non nega l’atto specifico.”,red:true},
{txt:”«Non ho usato quei dati.»”,note:“Negazione diretta dell’atto.”,red:false},
],
domande:[
{q:“Non ti ho chiesto che tipo di persona sei — ti ho chiesto se l’hai fatto. L’hai fatto?”,why:“Riporta alla negazione specifica dell’atto.”},
],
fonte:“Sapir (1987); Adams (1996).”},

N02:{id:“N02”,cat:“negazione”,spec:3,name:“Negazione parziale”,
desc:”‘Non ho rubato un milione di euro.’ La versione reale era cinquantamila. Il soggetto sceglie la versione dell’accusa che può negare con certezza — quella massima — lasciando aperta la versione reale.”,
operativo:“Analizza cosa esattamente viene negato. È la versione dell’accusa o una versione amplificata?”,
esempi:[
{txt:”«Non ho mai aggredito fisicamente nessuno in vita mia.»”,note:”‘Aggredito fisicamente’ è il massimo — la spinta può non rientrare.”,red:true},
],
domande:[
{q:“Non ti ho parlato di aggressione — ti ho chiesto della spinta. C’è stata?”,why:“Riporta alla versione specifica dell’accusa.”},
],
fonte:“Adams (1996).”},

N03:{id:“N03”,cat:“negazione”,spec:2,name:“Negazione ridondante”,
desc:“Nega la stessa cosa più volte nella stessa risposta. La ridondanza negativa segnala ansia da falsificazione — il soggetto vuole essere assolutamente sicuro che la negazione venga registrata.”,
operativo:“Conta le negazioni sullo stesso fatto in ogni risposta.”,
esempi:[
{txt:”«Non ho preso quei soldi. Non li ho toccati. Non so nemmeno dove fossero. Non ero presente.»”,note:“Quattro negazioni distinte sulla stessa accusa.”,red:true},
],
domande:[
{q:“Ti ho capito — non l’hai fatto. Perché hai bisogno di dirmelo quattro volte?”,why:“Meta-comunicazione sulla ridondanza.”},
],
fonte:“Vrij (2008) — over-denial come segnale di deception anxiety.”},

NA01:{id:“NA01”,cat:“narrativo”,spec:3,name:“Assenza dettagli sensoriali”,
desc:“Reality Monitoring: i ricordi di eventi realmente vissuti contengono caratteristicamente dettagli sensoriali. I ricordi costruiti tendono a contenere più dettagli cognitivi e inferenziali che sensoriali.”,
operativo:“Conta i riferimenti sensoriali per ogni 100 parole. Confronta con le norme del soggetto in narrazioni neutre.”,
esempi:[
{txt:”«Siamo andati al ristorante, abbiamo parlato, poi siamo tornati.»”,note:“Nessun dettaglio sensoriale.”,red:true},
{txt:”«Ci siamo seduti vicino alla finestra, c’era profumo di pane. Ho preso la pasta al ragù.»”,note:“Dettagli sensoriali autentici.”,red:false},
],
domande:[
{q:“Com’era fisicamente il posto — cosa vedevi intorno?”,why:“Forza la ricostruzione sensoriale.”},
{q:“Chiudi gli occhi un secondo — cosa sentivi in quel momento?”,why:“Distingue ricordo da costruzione.”},
],
fonte:“Johnson & Raye (1981) — Reality Monitoring; Steller & Köhnken (1989).”},

NA02:{id:“NA02”,cat:“narrativo”,spec:3,name:“Dettaglio centrale compresso”,
desc:“Nei ricordi autentici gli eventi più significativi tendono a ricevere più elaborazione. Nelle narrazioni costruite l’evento critico viene compresso — spesso in una sola frase — mentre i dettagli di contorno vengono espansi.”,
operativo:“Misura il rapporto parole/evento per ogni segmento. Il punto di massima compressione è il punto di analisi.”,
esempi:[
{txt:”«Abbiamo passato tutta la mattina a preparare la riunione, poi verso le due è arrivato il cliente, abbiamo parlato un po’, e poi nel pomeriggio ho ripreso il lavoro.»”,note:”‘Abbiamo parlato un po’’ copre la riunione critica.”,red:true},
],
domande:[
{q:”‘Avete parlato un po’’ — di cosa esattamente?”,why:“Forza l’espansione del punto compresso.”},
{q:“Quanto è durata questa conversazione?”,why:“La durata rivela quanto era importante.”},
],
fonte:“Steller & Köhnken (1989).”},

NA05:{id:“NA05”,cat:“narrativo”,spec:2,name:“Introduzione non richiesta di elementi”,
desc:“Le informazioni introdotte spontaneamente senza che fossero richieste rivelano ciò che il soggetto ritiene importante chiarire. Spesso sono difese preventive.”,
operativo:“Mappa tutto ciò che il soggetto dice senza che gli sia stato chiesto.”,
esempi:[
{txt:”«Sì ero lì, ma voglio precisare che non ho parlato con nessuno di specifico.»”,note:“Nessuno aveva chiesto con chi avesse parlato.”,red:true},
],
domande:[
{q:“Perché ti sembra importante precisare quello?”,why:“La precisazione non richiesta viene esplorata.”},
],
fonte:“Sapir (1987); Adams (1996).”},

PR01:{id:“PR01”,cat:“pragmatico”,spec:3,name:“Risposta con contro-domanda”,
desc:“La contro-domanda è uno dei dispositivi pragmatici più efficaci per guadagnare tempo e spostare il controllo conversazionale. ‘Perché me lo chiedi?’ invece di rispondere direttamente.”,
operativo:“Ogni risposta con domanda a una domanda diretta è un segnale da annotare.”,
esempi:[
{txt:“D: ‘Eri lì quella sera?’ R: ‘Perché mi stai facendo questa domanda?’”,note:“Contro-domanda su domanda diretta binaria.”,red:true},
],
domande:[
{q:“Ti risponderò — prima dimmi tu: eri lì?”,why:“Mantiene la precedenza della domanda originale.”},
],
fonte:“Vrij (2008) — counter-questions as delay strategy.”},

PR04:{id:“PR04”,cat:“pragmatico”,spec:3,name:“Informazione difensiva non richiesta”,
desc:“Il soggetto include nella risposta elementi che non erano stati richiesti e che hanno funzione difensiva. ‘Ero lì — e tra l’altro avevo sempre avuto un ottimo rapporto con tutti.’ Nessuno aveva messo in discussione il suo rapporto.”,
operativo:“Ogni informazione aggiunta non richiesta con funzione difensiva è un segnale.”,
esempi:[
{txt:”«Sì, ho firmato quel documento — e voglio precisare che l’ho letto attentamente e tutto era in regola.»”,note:”‘Voglio precisare’ introduce difesa non richiesta.”,red:true},
],
domande:[
{q:“Perché è importante per te precisare questo?”,why:“Esplora la funzione della difesa non richiesta.”},
],
fonte:“Adams (1996) — volunteered information as signal.”},

PR05:{id:“PR05”,cat:“pragmatico”,spec:2,name:“Frame shift narrativo”,
desc:“Il soggetto reinterpreta il contesto della domanda per rispondere a una versione più comoda. ‘Dipende da cosa intendi per presente. Se intendi fisicamente nello stesso edificio, sì.’”,
operativo:“Nota ogni qualificazione del frame prima della risposta.”,
esempi:[
{txt:”«Dipende da cosa intendi per ‘presente’. Se intendi fisicamente nello stesso edificio, sì.»”,note:“Il frame shift restringe ‘presente’ a qualcosa che può ammettere.”,red:true},
],
domande:[
{q:“Nel senso più ovvio del termine — eri lì?”,why:“Chiude il frame shift con la formulazione più diretta.”},
],
fonte:“Levine (2014) — equivocation as deception strategy.”},
};

let drawerOpenId = null;

function openDrawer(markerId) {
const m = LINGUA_DB[markerId];
if (!m) return;
drawerOpenId = markerId;

const dots = [1,2,3].map(i=>`<div class="ds-dot${i<=m.spec?' on':''}"></div>`).join(””);

document.getElementById(“drawerHeader”).innerHTML = ` <div class="dh-eyebrow">Database LINGUA · Scheda marker</div> <div class="dh-code">${m.id} · ${m.cat}</div> <div class="dh-name">${m.name}</div> <div class="dh-spec">${dots}<span class="ds-lbl">Specificità per inganno</span></div>`;

let body = ` <div class="db-block"> <div class="db-label">Descrizione</div> <div class="db-text">${escH(m.desc)}</div> </div> <div class="db-block"> <div class="db-label">Uso operativo</div> <div class="db-op">${escH(m.operativo)}</div> </div>`;

if (m.esempi && m.esempi.length) {
body += `<div class="db-block"> <div class="db-label">Esempi — <span style="color:var(--accent)">rosso = segnale</span> · grigio = autentico</div> <div class="ex-list"> ${m.esempi.map(e=>`
<div class="ex-it${e.red?' red':''}">
<div class="ex-txt">${escH(e.txt)}</div>
<div class="ex-note">${escH(e.note)}</div>
</div>`).join("")} </div> </div>`;
}

if (m.domande && m.domande.length) {
body += `<div class="db-block"> <div class="db-label">Domande provocatorie</div> <div class="dq-list"> ${m.domande.map((d,i)=>{ const qid = `dq_${markerId}_${i}`; const used = state.q_used.has(qid); return `<div class="dq-it${used?' used-q':''}" onclick="useDrawerQ('${qid}',this)">
<div class="dq-text">${escH(d.q)}</div>
<div class="dq-why">${escH(d.why)}</div>
</div>`; }).join("")} </div> </div>`;
}

if (m.fonte) {
body += `<div class="fonte-small">${escH(m.fonte)}</div>`;
}

document.getElementById(“drawerBody”).innerHTML = body;
document.getElementById(“drawerOverlay”).classList.add(“open”);
document.body.style.overflow = “hidden”;
}

function closeDrawer(e) {
if (e && e.target !== document.getElementById(“drawerOverlay”)) return;
document.getElementById(“drawerOverlay”).classList.remove(“open”);
document.body.style.overflow = “”;
drawerOpenId = null;
}

function useDrawerQ(qid, el) {
if (state.q_used.has(qid)) state.q_used.delete(qid);
else state.q_used.add(qid);
el.classList.toggle(“used-q”);
}

{q:“Stai parlando di te o in generale?”,why:“La domanda diretta costringe a scegliere.”},
{q:“Tu personalmente — hai fatto questa cosa?”,why:”‘Tu personalmente’ elimina lo schermo indefinito.”},
],
fonte:“Sapir (1987) — SCAN: linguaggio in prima persona come criterio.”
},
P04:{ name:“Assenza possessivo su relazioni”, cat:“pronominale”, spec:1,
desc:“Nei testi autentici le persone dicono ‘mia moglie’, ‘il mio collega’. Nei testi ingannevoli le relazioni con persone coinvolte vengono de-possessivizzate: ‘la moglie’, ‘il collega’. La distanza emotiva diventa distanza linguistica.”,
operativo:“Nota l’assenza del possessivo su relazioni che il soggetto dovrebbe sentire come proprie.”,
esempi:[
{txt:”«Ho parlato con la moglie quella sera.»”,note:”‘La moglie’ senza possessivo — chi è? Distanza.”,red:true},
{txt:”«Ho parlato con mia moglie quella sera.»”,note:“Possessivo presente — autentico.”,red:false},
],
domande:[
{q:“Di chi stai parlando — tua moglie o qualcun altro?”,why:“Forza il riconoscimento della relazione.”},
],
fonte:“Adams (1996); Sapir (1987).”
},
P05:{ name:“Risposta in terza persona a domanda in seconda”, cat:“pronominale”, spec:3,
desc:“Quando chiedi ‘Hai fatto X?’ e il soggetto risponde ‘Quello non è stato fatto’ — il cambio pronominale è uno dei segnali pronominali più specifici.”,
operativo:“Il cambio da seconda a terza persona su domanda diretta è segnale forte di evitamento della responsabilità.”,
esempi:[
{txt:“D: ‘Hai tu firmato quel documento?’ R: ‘Quel documento è stato firmato nel quadro della procedura normale.’”,note:“Passivo senza agente — risponde senza rispondere.”,red:true},
],
domande:[
{q:“La mia domanda era su di te — sei stato tu o no?”,why:“Riancora esplicitamente la domanda al soggetto.”},
],
fonte:“Vrij (2008) — evasione pronominale.”
},
P06:{ name:“Plurale inclusivo come diluzione”, cat:“pronominale”, spec:2,
desc:“Il soggetto usa ‘noi’ per decisioni che ha preso da solo, o per azioni che sa di aver compiuto personalmente. Il plurale ridistribuisce la responsabilità senza affermare una falsità esplicita.”,
operativo:“Confronta l’uso del plurale con i fatti noti. Chi c’era? Erano davvero in molti?”,
esempi:[
{txt:”«Abbiamo deciso di procedere in quel modo.»”,note:“Poi emerge che era l’unico a poter prendere quella decisione.”,red:true},
],
domande:[
{q:“Chi altro ha partecipato a questa decisione?”,why:“Se ‘noi’ era retorico, non sa rispondere in modo specifico.”},
],
fonte:“Pennebaker (2011); Hancock et al. (2008).”
},
P08:{ name:“Inversione agente-paziente”, cat:“pronominale”, spec:2,
desc:”«Mi sono trovato in quella situazione», «mi è capitato di», «mi si è presentata l’occasione». Il soggetto grammaticalizza sé stesso come destinatario passivo invece che come attore attivo.”,
operativo:“Nota i costrutti passivi e riflessivi su azioni che il soggetto ha compiuto attivamente.”,
esempi:[
{txt:”«Mi sono ritrovato a gestire quella situazione.»”,note:”‘Ritrovato’ — come se fosse accaduto senza intenzione.”,red:true},
{txt:”«Ho scelto di gestire quella situazione.»”,note:“Agentività esplicita — autentico.”,red:false},
],
domande:[
{q:“Hai scelto tu di farlo o è capitato senza volerlo?”,why:“Forza la distinzione tra agentività e passività.”},
],
fonte:“Sapir (1987) — SCAN: agentività linguistica.”
},
T01:{ name:“Alibi temporale eccessivamente preciso”, cat:“temporale”, spec:3,
desc:“La memoria episodica non funziona come un registro. I dettagli temporali precisi su eventi ordinari di settimane fa non emergono spontaneamente. Quando il soggetto fornisce orari esatti senza essere chiesto, sta attingendo a un racconto costruito.”,
operativo:“Chiedi dove ha ricevuto questa informazione temporale. Se non può dirlo, la precisione è sospetta.”,
esempi:[
{txt:”«Ero a casa dalle 19:47. Ho cenato alle 20:15, ho guardato la TV fino alle 22:30.»”,note:“Precisione impossibile per ricordo naturale di una serata ordinaria.”,red:true},
{txt:”«Quella sera ero a casa, ho cenato tardi, mi sembra verso le otto e mezza.»”,note:“Vaghe imprecisioni tipiche del ricordo autentico.”,red:false},
],
domande:[
{q:“Come fai a sapere con certezza che erano le 19:47?”,why:“Chiede la fonte della precisione — il ricordo autentico non ha fonte.”},
{q:“Normalmente ricordi gli orari con questa precisione?”,why:“Confronto con il comportamento memorativo abituale.”},
],
fonte:“Loftus (1979); Vrij (2008) — memoria è ricostruzione.”
},
T02:{ name:“Gap temporale non giustificato”, cat:“temporale”, spec:3,
desc:“I gap costruiti coprono esattamente il periodo rilevante. La narrazione salta da un momento sicuro a un momento sicuro, lasciando vuoto il centro.”,
operativo:“Mappa la linea temporale. Dove si ferma la narrazione? Cosa copre il gap?”,
esempi:[
{txt:”«Sono uscito verso le sei, poi il mattino dopo ero già in ufficio.»”,note:“Tutta la notte non viene coperta.”,red:true},
],
domande:[
{q:“Cosa è successo tra le sei di sera e il mattino dopo?”,why:“Riempie il gap con richiesta diretta.”},
{q:“Non ricordi cosa hai fatto quella sera o non vuoi dirlo?”,why:“Distingue tra dimenticanza e reticenza.”},
],
fonte:“Adams (1996) — gap narrativi come indicatori SCAN.”
},
T03:{ name:“Verb tense shift non giustificato”, cat:“temporale”, spec:3,
desc:“Quando il soggetto passa improvvisamente al presente storico narrando eventi passati, sta costruendo la scena mentre parla. Il passaggio al passato remoto su eventi recenti crea distanza psicologica.”,
operativo:“Trascrivi i tempi verbali per ogni segmento. Le discontinuità sono i punti di analisi.”,
esempi:[
{txt:”«Eravamo in ufficio, parlavamo del progetto, poi lui si alza e mi dice…»”,note:“Shift al presente — ricostruzione visiva attiva.”,red:true},
],
domande:[
{q:“Stai ricordando o stai immaginando questa scena?”,why:“Rivela la fonte del racconto.”},
],
fonte:“Sapir (1987); Adams (1996) — cambio tempo verbale come segnale SCAN.”
},
T05:{ name:“Markers temporali vaghi su periodi critici”, cat:“temporale”, spec:2,
desc:“La vaghezza temporale diventa segnale quando è selettiva: preciso su eventi non critici, vago su eventi critici.”,
operativo:“Mappa la distribuzione di vaghezza/precisione temporale lungo tutta la narrazione.”,
esempi:[
{txt:”«Ero in ufficio fino a tardi, poi ad un certo punto sono andato via.»”,note:”‘Ad un certo punto’ copre il momento critico.”,red:true},
],
domande:[
{q:”‘Tardi’ — intendi dopo le sette? Le otto?”,why:“Progressiva specificazione — vedi dove la vaghezza resiste.”},
],
fonte:“Vrij (2008) — vaghezza selettiva come strategia di evitamento.”
},
T07:{ name:“Espansione narrativa su periodi non critici”, cat:“temporale”, spec:2,
desc:“Il soggetto descrive in dettaglio le ore precedenti e successive all’evento, comprimendo o saltando il momento rilevante. Molto prima e dopo, nulla al centro.”,
operativo:“Misura il rapporto parole/minuto di tempo narrato per ogni segmento.”,
esempi:[
{txt:”«Quella mattina mi sono alzato, ho fatto colazione, ho portato i bambini… poi verso sera ero di nuovo a casa…»”,note:“Molto prima e dopo — il pomeriggio critico non viene narrato.”,red:true},
],
domande:[
{q:“E il pomeriggio — dove eri?”,why:“Riempie il gap con richiesta diretta.”},
],
fonte:“Adams (1996); Steller & Köhnken (1989).”
},
E01:{ name:“Hedging eccessivo su fatti certi”, cat:“epistemico”, spec:3,
desc:“L’hedging diventa segnale quando è usato su fatti che per loro natura il soggetto dovrebbe ricordare con certezza. ‘Mi sembra di essere rimasto a casa’ su una sera in cui è accusato di qualcosa crea ambiguità protettiva.”,
operativo:“Classifica ogni affermazione: certa / plausibilmente incerta / sospettosamente incerta.”,
esempi:[
{txt:”«Credo di esserci andato, mi sembra di sì. Non ricordo bene.»”,note:“Sull’evento centrale dell’interrogatorio.”,red:true},
{txt:”«Sì, c’ero — ricordo chiaramente perché era il compleanno di mia sorella.»”,note:“Certezza ancorata a un dettaglio contestuale.”,red:false},
],
domande:[
{q:”‘Credo’ — o ci sei andato o non ci sei andato. Qual è?”,why:“Forza la scelta binaria eliminando l’ambiguità.”},
{q:“Cosa ti farebbe ricordare con certezza?”,why:“Sonda la fonte epistemica del ricordo.”},
],
fonte:“Vrij (2008) — hedging come distancing epistemico.”
},
E04:{ name:“Sapere inatteso”, cat:“epistemico”, spec:3,
desc:“Il segnale più forte del database. Se il soggetto afferma di non essere stato presente, ma poi dimostra conoscenza di dettagli che solo un testimone diretto potrebbe avere, la sua versione è contraddetta dalla sua stessa conoscenza.”,
operativo:“Confronta sistematicamente ciò che afferma di sapere con ciò che afferma di non aver visto o fatto.”,
esempi:[
{txt:”«Non ero lì. So solo che hanno usato la porta sul retro perché quella principale era bloccata.»”,note:“Sa della porta — come, se non era lì?”,red:true},
],
domande:[
{q:“Come sai della porta sul retro se non eri lì?”,why:“La contraddizione viene esplicitata.”},
],
fonte:“Vrij (2008) — knowledge leakage, alta specificità.”
},
E08:{ name:“Over-affermazione di onestà”, cat:“epistemico”, spec:2,
desc:“Le persone oneste tendono a non enfatizzare la propria onestà — la danno per scontata. Le formule di giuramento (‘Vi giuro’, ‘sulla mia vita’) sono più frequenti nei testi ingannevoli.”,
operativo:“Conta le formule di assicurazione della verità. Contrasta con il contenuto informativo.”,
esempi:[
{txt:”«Vi giuro sulla vita dei miei figli che quella sera non ero lì. Ve lo prometto, sono completamente onesto.»”,note:“Due formule di giuramento su una sola affermazione.”,red:true},
{txt:”«Quella sera ero a casa.»”,note:“Affermazione diretta senza enfasi — tipica dell’onestà.”,red:false},
],
domande:[
{q:“Non ho dubitato della tua onestà — perché ti sembra importante sottolinearlo?”,why:“Meta-comunicazione sull’enfasi stessa.”},
],
fonte:“Vrij (2008) — protestations of honesty; Ekman (1985).”
},
E09:{ name:“Risposta alla domanda sbagliata”, cat:“epistemico”, spec:3,
desc:“Il soggetto risponde a una versione diversa della domanda posta — più ampia, più generica, o laterale. Ha scelto la domanda a cui rispondere invece di rispondere alla domanda.”,
operativo:“Trascrivi la domanda e la risposta. Sono sulla stessa cosa?”,
esempi:[
{txt:“D: ‘Hai aperto quel file?’ R: ‘Io non ho mai violato le policy aziendali in vita mia.’”,note:“Allarga il campo evitando la domanda specifica.”,red:true},
],
domande:[
{q:“La mia domanda era specifica: hai aperto quel file — sì o no?”,why:“Riancora la domanda originale senza accettare la risposta laterale.”},
],
fonte:“Sapir (1987) — risposta alla domanda come criterio SCAN.”
},
N01:{ name:“Negazione qualificata”, cat:“negazione”, spec:3,
desc:”‘Non sono il tipo che…’ invece di ‘Non l’ho fatto.’ Costruisce una descrizione di sé come persona che non farebbe quella cosa — vero in astratto, ma non nega l’atto specifico.”,
operativo:“Distingui tra negazione dell’atto specifico e negazione del carattere compatibile con l’atto.”,
esempi:[
{txt:”«Non sono una persona che userebbe mai i dati degli altri in questo modo.»”,note:“Descrive il carattere — non nega l’atto.”,red:true},
{txt:”«Non ho usato quei dati.»”,note:“Negazione diretta dell’atto.”,red:false},
],
domande:[
{q:“Non ti ho chiesto che tipo di persona sei — hai fatto questa cosa specifica: sì o no?”,why:“Riporta alla negazione specifica dell’atto.”},
],
fonte:“Sapir (1987); Adams (1996) — negazione qualificata vs assoluta.”
},
N02:{ name:“Negazione parziale”, cat:“negazione”, spec:3,
desc:“Il soggetto sceglie la versione dell’accusa che può negare con certezza — quella massima o quella più estrema — lasciando aperta la versione reale.”,
operativo:“Analizza cosa esattamente viene negato. È la versione dell’accusa o una versione amplificata?”,
esempi:[
{txt:”«Non ho mai aggredito fisicamente nessuno in vita mia.»”,note:”‘Aggredito fisicamente’ è il massimo — la spinta non rientra.”,red:true},
],
domande:[
{q:“Non ti ho parlato di aggressione — ti ho chiesto della spinta. C’è stata?”,why:“Riporta alla versione specifica dell’accusa.”},
],
fonte:“Adams (1996) — scope della negazione come segnale diagnostico.”
},
N03:{ name:“Negazione ridondante”, cat:“negazione”, spec:2,
desc:”‘Non l’ho fatto. Assolutamente no. Non sono stato io. Non c’ero.’ Quattro negazioni sullo stesso fatto. La ridondanza segnala ansia da falsificazione.”,
operativo:“Conta le negazioni sullo stesso fatto in ogni risposta.”,
esempi:[
{txt:”«Non ho preso quei soldi. Non li ho toccati. Non so nemmeno dove fossero. Non ero presente.»”,note:“Quattro negazioni distinte sulla stessa accusa.”,red:true},
],
domande:[
{q:“Ti ho capito — non l’hai fatto. Perché hai bisogno di dirmelo quattro volte?”,why:“Meta-comunicazione sulla ridondanza.”},
],
fonte:“Vrij (2008) — over-denial come segnale di deception anxiety.”
},
NA01:{ name:“Assenza dettagli sensoriali”, cat:“narrativo”, spec:3,
desc:“Reality Monitoring: i ricordi di eventi realmente vissuti contengono caratteristicamente dettagli sensoriali — cosa si vedeva, sentiva, odorava. I ricordi costruiti tendono a non averne.”,
operativo:“Conta i riferimenti sensoriali per ogni 100 parole. Confronta con le norme del soggetto in narrazioni neutre.”,
esempi:[
{txt:”«Siamo andati al ristorante, abbiamo parlato, poi siamo tornati.»”,note:“Nessun dettaglio sensoriale.”,red:true},
{txt:”«Ci siamo seduti vicino alla finestra, c’era profumo di pane. Ho preso la pasta al ragù.»”,note:“Dettagli sensoriali autentici.”,red:false},
],
domande:[
{q:“Com’era fisicamente il posto — cosa vedevi intorno?”,why:“Forza la ricostruzione sensoriale.”},
{q:“Chiudi gli occhi un secondo — cosa sentivi in quel momento?”,why:“Distingue ricordo da costruzione.”},
],
fonte:“Johnson & Raye (1981) — Reality Monitoring; Steller & Köhnken (1989) — CBCA.”
},
NA02:{ name:“Dettaglio centrale compresso”, cat:“narrativo”, spec:3,
desc:“L’evento critico viene narrato in poche parole mentre i dettagli di contorno vengono espansi. Il centro narrativo è il punto di minor elaborazione.”,
operativo:“Misura il rapporto parole/evento per ogni segmento. Il punto di massima compressione è il punto di analisi.”,
esempi:[
{txt:”«Abbiamo passato tutta la mattina a preparare, poi verso le due è arrivato il cliente, abbiamo parlato un po’, e poi nel pomeriggio ho ripreso.»”,note:”‘Abbiamo parlato un po’’ copre la riunione critica.”,red:true},
],
domande:[
{q:”‘Avete parlato un po’’ — di cosa esattamente?”,why:“Forza l’espansione del punto compresso.”},
{q:“Quanto è durata questa conversazione?”,why:“La durata rivela quanto era importante.”},
],
fonte:“Steller & Köhnken (1989) — CBCA: quantità di dettaglio.”
},
NA05:{ name:“Introduzione non richiesta”, cat:“narrativo”, spec:2,
desc:“Le informazioni introdotte spontaneamente senza che fossero richieste rivelano ciò che il soggetto ritiene importante chiarire. Spesso sono difese preventive.”,
operativo:“Mappa tutto ciò che il soggetto dice senza che gli sia stato chiesto.”,
esempi:[
{txt:”«Sì ero lì, ma voglio precisare che non ho parlato con nessuno di specifico.»”,note:“Nessuno aveva chiesto con chi avesse parlato.”,red:true},
],
domande:[
{q:“Perché ti sembra importante precisare quello?”,why:“La precisazione non richiesta viene esplorata.”},
],
fonte:“Sapir (1987); Adams (1996) — unprompted information.”
},
PR01:{ name:“Risposta con contro-domanda”, cat:“pragmatico”, spec:3,
desc:“La contro-domanda è un dispositivo per guadagnare tempo e spostare il controllo conversazionale. ‘Perché me lo chiedi?’ invece di rispondere.”,
operativo:“Ogni risposta con domanda a una domanda diretta è un segnale da annotare.”,
esempi:[
{txt:“D: ‘Eri lì quella sera?’ R: ‘Perché mi stai facendo questa domanda?’”,note:“Contro-domanda su domanda diretta binaria.”,red:true},
],
domande:[
{q:“Ti risponderò — prima dimmi tu: eri lì?”,why:“Mantiene la precedenza della domanda originale.”},
],
fonte:“Vrij (2008) — counter-questions as delay strategy.”
},
PR04:{ name:“Informazione difensiva non richiesta”, cat:“pragmatico”, spec:3,
desc:“Il soggetto include elementi difensivi nella risposta senza che siano stati richiesti. Costruisce l’immagine del testimone collaborativo dove non è stato attaccato.”,
operativo:“Ogni informazione aggiunta non richiesta con funzione difensiva è un segnale.”,
esempi:[
{txt:”«Sì, ho firmato quel documento — e voglio precisare che l’ho letto attentamente e tutto era in regola.»”,note:”‘Voglio precisare’ introduce una difesa non richiesta.”,red:true},
],
domande:[
{q:“Perché è importante per te precisare questo?”,why:“Esplora la funzione della difesa non richiesta.”},
],
fonte:“Adams (1996) — volunteered information.”
},
PR05:{ name:“Frame shift narrativo”, cat:“pragmatico”, spec:2,
desc:“Il soggetto non risponde alla domanda nel frame in cui è stata posta, ma a una versione reinterpretata. Permette risposte tecnicamente non false ma fuorvianti.”,
operativo:“Nota ogni qualificazione del frame prima della risposta.”,
esempi:[
{txt:”«Dipende da cosa intendi per ‘presente’. Se intendi fisicamente nello stesso edificio, sì.»”,note:“Restringe ‘presente’ a qualcosa che può ammettere.”,red:true},
],
domande:[
{q:“Nel senso più ovvio del termine — eri lì?”,why:“Chiude il frame shift con la formulazione più diretta.”},
],
fonte:“Levine (2014) — equivocation as deception strategy.”
},
};

// DRAWER LINGUA
// ═══════════════════════════════════════════════════════════

let currentDrawerMarker = null;

function openDrawer(markerId) {
currentDrawerMarker = markerId;
const m = LINGUA_DB[markerId];
if (!m) return;

const specDots = [1,2,3].map(i=>`<div class="ds-dot${i<=m.spec?' on':''}"></div>`).join(””);
const esempi = (m.esempi||[]).map(e=>
`<div class="ex-it${e.red?' red':''}"> <div class="ex-txt">${escH(e.txt)}</div> <div class="ex-note">${escH(e.note)}</div> </div>`).join(””);
const domande = (m.domande||[]).map((d,i)=>
`<div class="dq-it" onclick="useDrawerQ('${markerId}',${i},this)"> <div class="dq-text">${escH(d.q)}</div> <div class="dq-why">${escH(d.why)}</div> </div>`).join(””);

const overlay = document.getElementById(“drawerOverlay”);
overlay.querySelector(”.dh-code”).textContent = markerId + “ · “ + m.cat;
overlay.querySelector(”.dh-name”).textContent = m.name;
overlay.querySelector(”.dh-spec”).innerHTML = specDots + `<span class="ds-lbl">Specificità ${m.spec}/3</span>`;
overlay.querySelector(”.db-desc”).innerHTML = escH(m.desc);
overlay.querySelector(”.db-op”).innerHTML = escH(m.operativo||””);
overlay.querySelector(”.db-esempi”).innerHTML = esempi;
overlay.querySelector(”.db-domande”).innerHTML = domande;
overlay.querySelector(”.db-fonte”).textContent = m.fonte||””;

overlay.classList.add(“open”);
document.body.style.overflow = “hidden”;
}

function closeDrawer() {
document.getElementById(“drawerOverlay”).classList.remove(“open”);
document.body.style.overflow = “”;
}

function useDrawerQ(markerId, qi, el) {
const key = `drawer_${markerId}_${qi}`;
if (state.q_used.has(key)) { state.q_used.delete(key); el.classList.remove(“used-q”); }
else { state.q_used.add(key); el.classList.add(“used-q”); }
}

render();
</script>

      <div class="dh-eyebrow">LINGUA · Scheda marker</div>

      <div class="db-block">
        <div class="db-label">Descrizione</div>
        <div class="db-text db-desc"></div>
      </div>

        <div class="db-op"></div>
      </div>

        <div class="db-label">Esempi — <span style="color:var(--accent)">rosso = segnale</span></div>

        <div class="db-label">Domande provocatorie — tap per segnare usata</div>
        <div class="dq-list db-domande"></div>
      </div>
      <div class="fonte-small db-fonte"></div>
    </div>
  </div>
</div>
